spring.application.name=usedcars

# MySQL DataSource
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/used_cars_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=springstudent
spring.datasource.password=springstudent
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=9000

# JWT
jwt.secret=mySecretKeyForJwtTokenGenerationThatIsAtLeast256BitsLong!!
jwt.expiration=86400000

# File upload
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
